<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GuidesForge Recorder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      min-height: 200px;
      background: #0C0D14;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .header img { width: 24px; height: 24px; border-radius: 6px; }
    .header span { font-weight: 600; font-size: 14px; background: linear-gradient(135deg, #6366F1, #8B5CF6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .content { padding: 16px; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6b7280;
      flex-shrink: 0;
    }
    .status-dot.recording {
      background: #ef4444;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .status-dot.connected { background: #22c55e; }
    .status-text { color: #9ca3af; font-size: 13px; }
    .status-text strong { color: #fff; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
    .input-group { margin-bottom: 12px; }
    .input-group label { display: block; font-size: 12px; color: #9ca3af; margin-bottom: 4px; }
    .input-group input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 8px 12px;
      color: #fff;
      font-size: 13px;
      outline: none;
    }
    .input-group input:focus { border-color: #6366F1; }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.15s;
    }
    .btn-primary { background: #6366F1; color: #fff; }
    .btn-primary:hover { background: #5558e8; }
    .btn-danger { background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }
    .btn-danger:hover { background: rgba(239,68,68,0.2); }
    .btn-secondary { background: rgba(255,255,255,0.05); color: #9ca3af; border: 1px solid rgba(255,255,255,0.1); margin-top: 8px; }
    .btn-secondary:hover { color: #fff; background: rgba(255,255,255,0.1); }
    .steps-count {
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      color: #6366F1;
      margin-bottom: 4px;
    }
    .steps-label { text-align: center; font-size: 12px; color: #6b7280; margin-bottom: 16px; }
    .error-text { color: #ef4444; font-size: 12px; margin-top: 8px; text-align: center; }
    .user-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-top: 1px solid rgba(255,255,255,0.05);
      font-size: 12px;
      color: #9ca3af;
    }
    .user-info .email { color: #6366F1; }
    .logout-link { color: #9ca3af; cursor: pointer; font-size: 11px; text-decoration: underline; background: none; border: none; }
    .logout-link:hover { color: #ef4444; }
    .hidden { display: none; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon32.png" alt="GuidesForge" />
    <span>GuidesForge</span>
  </div>

  <!-- Login State -->
  <div id="login-state" class="content hidden">
    <div class="status">
      <div class="status-dot"></div>
      <div class="status-text">Sign in to start recording</div>
    </div>
    <div class="input-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@company.com" />
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Your password" />
    </div>
    <button class="btn btn-primary" id="login-btn">Sign In</button>
    <div id="login-error" class="error-text hidden"></div>
    <p style="text-align:center;margin-top:12px">
      <a href="https://guidesforge.org/register" target="_blank" style="color:#6366F1;font-size:12px;text-decoration:none">Create an account</a>
    </p>
  </div>

  <!-- Idle State -->
  <div id="idle-state" class="content hidden">
    <div class="status">
      <div class="status-dot connected"></div>
      <div class="status-text">Ready to record</div>
    </div>
    <div class="input-group">
      <label>Guide Title</label>
      <input type="text" id="guide-title" placeholder="How to set up your dashboard" />
    </div>
    <button class="btn btn-primary" id="start-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4" fill="currentColor"/></svg>
      Start Recording
    </button>
  </div>

  <!-- Recording State -->
  <div id="recording-state" class="content hidden">
    <div class="status">
      <div class="status-dot recording"></div>
      <div class="status-text"><strong>Recording...</strong> Click through your product</div>
    </div>
    <div class="steps-count" id="steps-count">0</div>
    <div class="steps-label">steps captured</div>
    <button class="btn btn-danger" id="stop-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/></svg>
      Stop &amp; Upload
    </button>
    <button class="btn btn-secondary" id="cancel-btn">Cancel Recording</button>
  </div>

  <!-- Done State -->
  <div id="done-state" class="content hidden">
    <div class="status">
      <div class="status-dot" style="background:#22c55e"></div>
      <div class="status-text"><strong>Upload complete!</strong></div>
    </div>
    <p style="text-align:center;color:#9ca3af;font-size:13px;margin:12px 0">
      Your guide is being processed by AI. Check your dashboard for results.
    </p>
    <button class="btn btn-primary" id="new-btn">Record Another Guide</button>
    <a href="https://guidesforge.org/dashboard" target="_blank" class="btn btn-secondary" style="text-decoration:none;margin-top:8px">Open Dashboard</a>
  </div>

  <!-- User Info (shown when logged in) -->
  <div id="user-info" class="user-info hidden">
    <span>Signed in as <span class="email" id="user-email"></span></span>
    <button class="logout-link" id="logout-btn">Sign out</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
